"},{"source":"Backend:service:AuthService","target":"Backend:prisma:dt_refresh_token","type":"USES_MODEL","label":"Prisma client read/write"},{"source":"Backend:service:AuthService","target":"Backend:prisma:rl_rol_permiso","type":"USES_MODEL","label":"Prisma client read/write"},{"source":"Backend:service:CategoriaService","target":"Backend:prisma:ct_categoria","type":"USES_MODEL","label":"Prisma client read/write"},{"source":"Backend:service:ClienteService","target":"Backend:prisma:ct_cliente","type":"USES_MODEL","label":"Prisma client read/write"},{"source":"Backend:service:ConfiguracionService","target":"Backend:prisma:ct_configuracion","type":"USES_MODEL","label":"Prisma client read/write"},{"source":"Backend:service:EmailService","target":"Backend:prisma:ct_plantilla_correo","type":"USES_MODEL","label":"Prisma client read/write"},{"source":"Backend:service:ExcelService","target":"Backend:prisma:ct_platillo","type":"USES_MODEL","label":"Prisma client read/write"},{"source":"Backend:service:ExcelService","target":"Backend:prisma:rl_orden","type":"USES_MODEL","label":"Prisma client read/write"},{"source":"Backend:service:MesaService","target":"Backend:prisma:ct_mesa","type":"USES_MODEL","label":"Prisma client read/write"},{"source":"Backend:service:OrdenService","target":"Backend:prisma:rl_orden","type":"USES_MODEL","label":"Prisma client read/write"},{"source":"Backend:service:PagoService","target":"Backend:prisma:ct_configuracion","type":"USES_MODEL","label":"Prisma client read/write"},{"source":"Backend:service:PagoService","target":"Backend:prisma:rl_reservacion","type":"USES_MODEL","label":"Prisma client read/write"},{"source":"Backend:service:PdfService","target":"Backend:prisma:ct_platillo","type":"USES_MODEL","label":"Prisma client read/write"},{"source":"Backend:service:PdfService","target":"Backend:prisma:rl_orden","type":"USES_MODEL","label":"Prisma client read/write"},{"source":"Backend:service:PlatilloService","target":"Backend:prisma:ct_platillo","typ losService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:store:PlatillosStore","target":"Frontend:service:NotificationService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:store:UsuariosStore","target":"Frontend:service:UsuarioService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:store:UsuariosStore","target":"Frontend:service:NotificationService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:component:NavbarComponent","target":"Frontend:store:AuthStore","type":"CONSUMES","label":"uses signal state"},{"source":"Frontend:component:LoginPageComponent","target":"Frontend:store:AuthStore","type":"CONSUMES","label":"uses signal state"},{"source":"Frontend:component:CocinaListPage","target":"Frontend:store:OrdenesStore","type":"CONSUMES","label":"uses signal state"},{"source":"Frontend:component:DashboardMainPage","target":"Frontend:service:DashboardService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:component:MesasComponent","target":"Frontend:store:MesasStore","type":"CONSUMES","label":"uses signal state"},{"source":"Frontend:component:MesasComponent","target":"Frontend:service:NotificationService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:component:OrdenCrearPage","target":"Frontend:store:PlatillosStore","type":"CONSUMES","label":"uses signal state"},{"source":"Frontend:component:OrdenCrearPage","target":"Frontend:store:MesasStore","type":"CONSUMES","label":"uses signal state"},{"source":"Frontend:component:OrdenCrearPage","target":"Frontend:store:CarritoStore","type":"CONSUMES","label":"uses signal state"},{"source":"Frontend:component:OrdenCrearPage","target":"Frontend:service:OrdenService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:component:OrdenCrearPage","target":"Frontend:service:NotificationService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:component:OrdenListPage","target":"Frontend:store:OrdenesStore","type":"CONSUMES","label":"uses signal state"},{"source":"Frontend:component:OrdenListPage","target":"Frontend:service:NotificationService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:component:PlatilloModalComponent","target":"Frontend:store:CategoriasStore","type":"CONSUMES","label":"uses signal state"},{"source":"Frontend:component:PlatilloBatchComponent","target":"Frontend:store:PlatillosStore","type":"CONSUMES","label":"uses signal state"},{"source":"Frontend:component:PlatillosComponent","target":"Frontend:store:PlatillosStore","type":"CONSUMES","label":"uses signal state"},{"source":"Frontend:component:PlatillosComponent","target":"Frontend:service:NotificationService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:component:MenuComponent","target":"Frontend:service:PlatillosService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:component:ReportesListPage","target":"Frontend:service:ReportesService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:component:ReservacionFormComponent","target":"Frontend:service:MesasService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:component:ReservacionPagoComponent","target":"Frontend:service:StripeService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:component:ReservacionCrearPage","target":"Frontend:service:ReservacionService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:component:ReservacionListPage","target":"Frontend:service:ReservacionService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:component:ReservacionListPage","target":"Frontend:service:NotificationService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:component:UsuarioFormComponent","target":"Frontend:store:UsuariosStore","type":"CONSUMES","label":"uses signal state"},{"source":"Frontend:component:UsuarioFormComponent","target":"Frontend:service:UsuarioService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:component:UsuarioFormComponent","target":"Frontend:service:NotificationService","type":"CALLS","label":"calls REST service"},{"source":"Frontend:component:UsuarioListPage","target":"Frontend:store:UsuariosStore","type":"CONSUMES","label":"uses signal state"},{"source":"Backend:resolver:CategoriaResolver","target":"Backend:graphql:query:categorias","type":"RESOLVES","label":"implements resolver logic"},{"source":"Backend:resolver:CategoriaResolver","target":"Backend:graphql:query:categoria","type":"RESOLVES","label":"implements resolver logic"},{"source":"Backend:resolver:MesaResolver","target":"Backend:graphql:query:mesas","type":"RESOLVES","label":"implements resolver logic"},{"source":"Backend:resolver:MesaResolver","target":"Backend:graphql:query:mesa","type":"RESOLVES","label":"implements resolver logic"},{"source":"Backend:resolver:OrdenResolver","target":"Backend:graphql:query:ordenes","type":"RESOLVES","label":"implements resolver logic"},{"source":"Backend:resolver:OrdenResolver","target":"Backend:graphql:query:orden","type":"RESOLVES","label":"implements resolver logic"},{"source":"Backend:resolver:OrdenResolver","target":"Backend:graphql:subscription:ordenNueva","type":"RESOLVES","label":"implements resolver logic"},{"source":"Backend:resolver:OrdenResolver","target":"Backend:graphql:subscription:ordenActualizada","type":"RESOLVES","label":"implements resolver logic"},{"source":"Backend:resolver:PlatilloResolver","target":"Backend:graphql:query:platillos","type":"RESOLVES","label":"implements resolver logic"},{"source":"Backend:resolver:PlatilloResolver","target":"Backend:graphql:query:platillo","type":"RESOLVES","label":"implements resolver logic"},{"source":"Backend:resolver:ReservacionResolver","target":"Backend:graphql:query:reservaciones","type":"RESOLVES","label":"implements resolver logic"},{"source":"Backend:resolver:ReservacionResolver","target":"Backend:graphql:query:reservacion","type":"RESOLVES","label":"implements resolver logic"}]};
    
    // Configuración Inicial e Indicadores
    document.getElementById('nodes-count').innerText = graphData.nodes.length;
    
    // Filtrar aristas inválidas (con origen o destino inexistente) para evitar que D3.js lance errores fatales
    const nodeIds = new Set(graphData.nodes.map(n => n.id));
    const validEdges = graphData.edges.filter(e => {
      const sourceId = typeof e.source === 'object' ? e.source.id : e.source;
      const targetId = typeof e.target === 'object' ? e.target.id : e.target;
      const exists = nodeIds.has(sourceId) && nodeIds.has(targetId);
      if (!exists) {
        console.warn('Enlace ignorado por nodo inexistente:', e);
      }
      return exists;
    });
    
    document.getElementById('edges-count').innerText = validEdges.length;

    // Colores por tipo de nodo
    const colors = {
      'REST_ENDPOINT': '#ef4444',
      'GRAPHQL_OPERATION': '#ec4899',
      'SERVICE': '#3b82f6',
      'CONTROLLER': '#10b981',
      'PRISMA_MODEL': '#f59e0b',
      'ANGULAR_STORE': '#8b5cf6',
      'ANGULAR_COMPONENT': '#06b6d4',
      'FILE': '#6b7280'
    };

    // Dimensiones
    const width = window.innerWidth;
    const height = window.innerHeight - 64; // Menos el header

    // Crear el SVG Canvas con D3
    const svg = d3.select('#graph-svg');
    const container = svg.append('g');

    // Añadir soporte para zoom y arrastre (zoom & pan)
    svg.call(d3.zoom().scaleExtent([0.1, 4]).on('zoom', (event) => {
      container.attr('transform', event.transform);
    }));

    // Marcador de flecha para los enlaces dirigidos
    svg.append('defs').append('marker')
      .attr('id', 'arrow')
      .attr('viewBox', '0 -5 10 10')
      .attr('refX', 18) // Posición para que la flecha coincida al borde del nodo
      .attr('refY', 0)
      .attr('markerWidth', 6)
      .attr('markerHeight', 6)
      .attr('orient', 'auto')
      .append('path')
      .attr('d', 'M0,-5L10,0L0,5')
      .attr('fill', '#4b5563');

    // Inicializar simulación de fuerzas
    const simulation = d3.forceSimulation(graphData.nodes)
      .force('link', d3.forceLink(validEdges).id(d => d.id).distance(120))
      .force('charge', d3.forceManyBody().strength(-150))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collision', d3.forceCollide().radius(30));

    // Dibujar enlaces (links)
    const link = container.append('g')
      .selectAll('line')
      .data(validEdges)
      .enter()
      .append('line')
      .attr('class', 'link')
      .attr('stroke', '#4b5563')
      .attr('marker-end', 'url(#arrow)');

    // Dibujar nodos (nodes)
    const node = container.append('g')
      .selectAll('g')
      .data(graphData.nodes)
      .enter()
      .append('g')
      .call(d3.drag()
        .on('start', dragstarted)
        .on('drag', dragged)
        .on('end', dragended))
      .on('click', (event, d) => showDetails(d));

    // Dibujar círculos dentro de los grupos de nodo
    node.append('circle')
      .attr('r', 12)
      .attr('class', 'node')
      .attr('fill', d => colors[d.type] || '#6b7280')
      .attr('stroke', '#0d1117')
      .attr('stroke-width', 2);

    // Dibujar etiquetas (labels) de nodos
    node.append('text')
      .attr('dx', 16)
      .attr('dy', 4)
      .attr('fill', '#c9d1d9')
      .style('font-size', '10px')
      .style('font-weight', '500')
      .style('pointer-events', 'none')
      .text(d => d.label);

    // Actualizar posiciones en cada tick de la simulación
    simulation.on('tick', () => {
      link
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);

      node
        .attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');
    });

    // Control del arrastre
    function dragstarted(event, d) {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x;
      d.fy = d.y;
    }

    function dragged(event, d) {
      d.fx = event.x;
      d.fy = event.y;
    }

    function dragended(event, d) {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null;
      d.fy = null;
    }

    // Mostrar detalles del nodo seleccionado
    function showDetails(d) {
      document.getElementById('node-name').innerText = d.label;
      document.getElementById('node-file').innerText = d.filePath || 'Sin archivo asignado';
      document.getElementById('node-layer').innerText = d.id.startsWith('Frontend:') ? 'Frontend (Angular)' : 'Backend (Express/GraphQL)';
      
      const badge = document.getElementById('node-type-badge');
      badge.className = 'badge-' + d.type;
      badge.innerText = d.type.replace('_', ' ');

      // Obtener relaciones entrantes y salientes
      const incoming = graphData.edges.filter(e => e.target.id === d.id);
      const outgoing = graphData.edges.filter(e => e.source.id === d.id);

      const incomingDiv = document.getElementById('incoming-relations');
      incomingDiv.innerHTML = '';
      if (incoming.length === 0) {
        incomingDiv.innerHTML = '<span class="relation-empty">Ninguna</span>';
      } else {
        incoming.forEach(e => {
          const item = document.createElement('div');
          item.className = 'relation-item';
          item.innerHTML = '<span class="relation-name">' + e.source.label + '</span> <span class="relation-type">' + e.type + '</span>';
          item.style.cursor = 'pointer';
          item.onclick = () => showDetails(e.source);
          incomingDiv.appendChild(item);
        });
      }

      const outgoingDiv = document.getElementById('outgoing-relations');
      outgoingDiv.innerHTML = '';
      if (outgoing.length === 0) {
        outgoingDiv.innerHTML = '<span class="relation-empty">Ninguna</span>';
      } else {
        outgoing.forEach(e => {
          const item = document.createElement('div');
          item.className = 'relation-item';
          item.innerHTML = '<span class="relation-name">' + e.target.label + '</span> <span class="relation-type">' + e.type + '</span>';
          item.style.cursor = 'pointer';
          item.onclick = () => showDetails(e.target);
          outgoingDiv.appendChild(item);
        });
      }

      // Resaltar en el SVG
      link.classed('active', false).attr('stroke', '#4b5563');
      link.filter(e => e.source.id === d.id || e.target.id === d.id)
        .classed('active', true)
        .attr('stroke', colors[d.type]);

      document.getElementById('details-panel').classList.remove('hidden');
    }

    // Panel close
    document.getElementById('close-panel').onclick = () => {
      document.getElementById('details-panel').classList.add('hidden');
      link.classed('active', false).attr('stroke', '#4b5563');
    };

    // Buscador interactivo
    document.getElementById('search-input').oninput = (e) => {
      const text = e.target.value.toLowerCase();
      node.select('circle').attr('r', d => {
        if (!text) return 12;
        return d.label.toLowerCase().includes(text) ? 20 : 8;
      });
      node.select('text').style('font-size', d => {
        if (!text) return '10px';
        return d.label.toLowerCase().includes(text) ? '14px' : '8px';
      });
    };

    // Ajuste de redimensión de ventana
    window.onresize = () => {
      simulation.force('center', d3.forceCenter(window.innerWidth / 2, (window.innerHeight - 64) / 2));
      simulation.alpha(0.3).restart();
    };

  </script>
